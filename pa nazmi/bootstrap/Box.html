<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <div class="container my-4 p-4 shadow-lg rounded bg-white">
            <div class="container my-4 border p-3">
                <h4>Justify-content-start</h4>
                <div class="d-flex justify-content-start gap-3">
                    <div class="card bg-secondary" style="width: 150px;">
                        <div class="card-body text-center">card 1</div>
                    </div>
                    <div class="card bg-secondary" style="width: 150px;">
                        <div class="card-body text-center">card 2</div>
                    </div>
                    <div class="card bg-secondary" style="width: 150px;">
                        <div class="card-body text-center">card 3</div>
                    </div>
                    <div class="card bg-secondary" style="width: 150px;">
                        <div class="card-body text-center">card 4</div>
                    </div>
                </div>
            </div>
        
            <div class="container my-4 border p-3">
                <h4>justify-content-between</h4>
                <div class="d-flex justify-content-between gap-3">
                    <div class="card bg-danger" style="width: 150px;">
                        <div class="card-body text-center">card 1</div>
                    </div>
                    <div class="card bg-danger" style="width: 150px;">
                        <div class="card-body text-center">card 2</div>
                    </div>
                    <div class="card bg-danger" style="width: 150px;">
                        <div class="card-body text-center">card 3</div>
                    </div>
                    <div class="card bg-danger" style="width: 150px;">
                        <div class="card-body text-center">card 4</div>
                    </div>
                </div>
            </div>
        
            <div class="container my-4 border p-3">
                <h5>justify-content-around</h5>
                <div class="d-flex justify-content-around">
                  <div class="card bg-warning" style="width: 150px;">
                    <div class="card-body text-center">Card 1</div>
                  </div>
                  <div class="card bg-warning" style="width: 150px;">
                    <div class="card-body text-center">Card 2</div>
                  </div>
                  <div class="card bg-warning" style="width: 150px;">
                    <div class="card-body text-center">Card 3</div>
                  </div>
                  <div class="card bg-warning" style="width: 150px;">
                    <div class="card-body text-center">Card 4</div>
                  </div>
            </div>
        </div>

        <div class="container my-4 border p-3">
          <h5>justify-content-center</h5>
          <div class="d-flex justify-content-center gap-3">
            <div class="card bg-info" style="width: 150px;">
              <div class="card-body text-center">Card 1</div>
            </div>
            <div class="card bg-info" style="width: 150px;">
              <div class="card-body text-center">Card 2</div>
            </div>
            <div class="card bg-info" style="width: 150px;">
              <div class="card-body text-center">Card 3</div>
            </div>
            <div class="card bg-info" style="width: 150px;">
              <div class="card-body text-center">Card 4</div>
            </div>
          </div>
        </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
