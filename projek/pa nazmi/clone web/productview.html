<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Produk</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWQyZHczZW56YmRvMHp4cGpia201cThlNWtqMnRmeGdvYjBtemExbSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/l0MYODQzHE3ibZ62A/200.webp ') no-repeat center/cover;
      backdrop-filter: blur(10px);
    }

    .container {
      width: 700px;
      height: 320px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      overflow: hidden;
      padding: 30px;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .image-section {
      width: 250px;
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      margin-right: 20px;
    }

    .image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .text-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .text-section h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
      color: #333;
    }

    .text-section p {
      color: #555;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 60px;
    }

    .button-group {
      position: absolute;
      bottom: 20px;
      right: 30px;
      display: flex;
      gap: 10px;
    }

    .button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .button a {
        text-decoration: none;
        list-style: none;
        color: #fff;
        font-weight: bold;
    }

    .button:hover {
      background: #ff4da6;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(255, 77, 166, 0.4);
    }

    .button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img src="gilangproduct.jpg" alt="Product Image">
    </div>
    <div class="text-section">
      <h1>This Is The Product</h1>
      <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Laborum harum voluptate tenetur distinctio quaerat.</p>
    </div>

    <div class="button-group">
      <button class="button"><a href="">Buy Now</a></button>
      <button class="button"><a href="jubel.html">Back</a></button>
    </div>
  </div>
</body>
</html>
