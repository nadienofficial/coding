<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Bendahara - Manajemen Keuangan</title>
    <link rel="stylesheet" href="App.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Aplikasi Bendahara</h1>
            <p>Manajemen Keuangan dengan Local Storage</p>
        </div>

        <div class="content">
            <!-- Pesan Sukses -->
            <div class="success-message" id="successMessage"></div>

            <!-- Form Input -->
            <div class="form-section">
                <h2>📝 Input Data Keuangan</h2>
                <form id="formInput">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tanggal">Tanggal:</label>
                            <input type="date" id="tanggal" required>
                        </div>
                        <div class="form-group">
                            <label for="tipe">Jenis Transaksi:</label>
                            <select id="tipe" required>
                                <option value="">-- Pilih --</option>
                                <option value="masuk">Pemasukan</option>
                                <option value="keluar">Pengeluaran</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="keterangan">Keterangan:</label>
                        <input type="text" id="keterangan" placeholder="Contoh: Uang dari setor, Pembelian alat" required>
                    </div>

                    <div class="form-group">
                        <label for="jumlah">Jumlah (Rp):</label>
                        <input type="number" id="jumlah" placeholder="Masukkan jumlah uang" min="0" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-simpan">💾 Simpan Data</button>
                        <button type="button" class="btn-hapus-semua" onclick="hapusSemua()">🗑️ Hapus Semua</button>
                    </div>
                </form>
            </div>

            <!-- Statistik -->
            <div class="stats" id="statsContainer"></div>

            <!-- List Data -->
            <div class="list-section">
                <h2>📊 Data Keuangan</h2>
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Jenis</th>
                            <th>Keterangan</th>
                            <th>Jumlah (Rp)</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="5" class="empty-message">Belum ada data. Silahkan tambahkan data baru.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Key untuk localStorage
        const STORAGE_KEY = 'bendahara_data';

        // Set tanggal default ke hari ini
        document.getElementById('tanggal').valueAsDate = new Date();

        // Event listener form submit
        document.getElementById('formInput').addEventListener('submit', function(e) {
            e.preventDefault();
            simpanData();
        });

        // FUNGSI: Simpan data ke localStorage
        function simpanData() {
            const tanggal = document.getElementById('tanggal').value;
            const tipe = document.getElementById('tipe').value;
            const keterangan = document.getElementById('keterangan').value;
            const jumlah = parseInt(document.getElementById('jumlah').value);

            // Validasi
            if (!tanggal || !tipe || !keterangan || !jumlah) {
                alert('Semua field harus diisi!');
                return;
            }

            // Ambil data yang sudah ada
            let data = getData();

            // Buat object baru
            const newData = {
                id: Date.now(), // ID unik berdasarkan timestamp
                tanggal: tanggal,
                tipe: tipe,
                keterangan: keterangan,
                jumlah: jumlah
            };

            // Tambah ke array
            data.push(newData);

            // Simpan ke localStorage
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

            // Tampilkan pesan sukses
            tampilkanPesanSukses('✅ Data berhasil disimpan!');

            // Reset form
            document.getElementById('formInput').reset();
            document.getElementById('tanggal').valueAsDate = new Date();

            // Refresh tampilan
            tampilkanData();
        }

        // FUNGSI: Ambil data dari localStorage
        function getData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // FUNGSI: Tampilkan data di tabel
        function tampilkanData() {
            const data = getData();
            const dataBody = document.getElementById('dataBody');

            if (data.length === 0) {
                dataBody.innerHTML = '<tr><td colspan="5" class="empty-message">Belum ada data. Silahkan tambahkan data baru.</td></tr>';
                tampilkanStatistik([]);
                return;
            }

            // Urutkan data berdasarkan tanggal terbaru
            data.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

            let html = '';
            data.forEach(item => {
                const tanggalFormat = new Date(item.tanggal).toLocaleDateString('id-ID');
                const jumlahFormat = item.jumlah.toLocaleString('id-ID');
                const tipeClass = item.tipe === 'masuk' ? 'masuk' : 'keluar';
                const tipeLabel = item.tipe === 'masuk' ? 'Pemasukan' : 'Pengeluaran';

                html += `
                    <tr class="${tipeClass}">
                        <td>${tanggalFormat}</td>
                        <td><span class="tipe-badge ${item.tipe}">${tipeLabel}</span></td>
                        <td>${item.keterangan}</td>
                        <td><strong>Rp${jumlahFormat}</strong></td>
                        <td><button class="btn-hapus" onclick="hapusData(${item.id})">Hapus</button></td>
                    </tr>
                `;
            });

            dataBody.innerHTML = html;
            tampilkanStatistik(data);
        }

        // FUNGSI: Tampilkan statistik
        function tampilkanStatistik(data) {
            let totalMasuk = 0;
            let totalKeluar = 0;

            data.forEach(item => {
                if (item.tipe === 'masuk') {
                    totalMasuk += item.jumlah;
                } else {
                    totalKeluar += item.jumlah;
                }
            });

            const saldo = totalMasuk - totalKeluar;

            const statsContainer = document.getElementById('statsContainer');
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <h3>Total Pemasukan</h3>
                    <div class="amount">Rp${totalMasuk.toLocaleString('id-ID')}</div>
                </div>
                <div class="stat-card">
                    <h3>Total Pengeluaran</h3>
                    <div class="amount">Rp${totalKeluar.toLocaleString('id-ID')}</div>
                </div>
                <div class="stat-card">
                    <h3>Saldo</h3>
                    <div class="amount" style="color: ${saldo >= 0 ? '#fff' : '#ffcccc'}">Rp${saldo.toLocaleString('id-ID')}</div>
                </div>
            `;
        }

        // FUNGSI: Hapus data berdasarkan ID
        function hapusData(id) {
            if (confirm('Apakah Anda yakin ingin menghapus data ini?')) {
                let data = getData();
                data = data.filter(item => item.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                tampilkanPesanSukses('✅ Data berhasil dihapus!');
                tampilkanData();
            }
        }

        // FUNGSI: Hapus semua data
        function hapusSemua() {
            if (confirm('⚠️ Apakah Anda yakin ingin menghapus SEMUA data? Tindakan ini tidak bisa dibatalkan!')) {
                localStorage.removeItem(STORAGE_KEY);
                tampilkanPesanSukses('✅ Semua data berhasil dihapus!');
                tampilkanData();
            }
        }

        // FUNGSI: Tampilkan pesan sukses
        function tampilkanPesanSukses(pesan) {
            const messageEl = document.getElementById('successMessage');
            messageEl.textContent = pesan;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        // Load data saat halaman dibuka
        window.addEventListener('load', function() {
            tampilkanData();
        });
    </script>
</body>
</html>
