<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar DOM JavaScript</title>
  <style>
    body {
       font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
       background-color: #2980b9;
    }

    h1 {
        font-family: Arial, Helvetica, sans-serif;
      color: greenyellow;
    }

    p {
      font-size: 20px;
      color: white;
      margin-bottom: 20px;
    }

    button {
      background-color: greenyellow;
      color: black;
      border: 2px solid black;
      padding: 10px 18px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background-color: white;
    }
    .con {
        background-color: goldenrod;
        height: 500px;
        width: 500px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-radius: 10px;
        box-shadow: 2px 4px 8px ;
    }
  </style>
</head>
<body>
    <div class="con">
        <h1>Belajar DOM JavaScript</h1>

        <p id="teksUtama">Selamat datang di halaman praktikum DOM.</p>
        <div>
            <button id="ubahTeks" onclick="t()">Ubah Teks</button>
            <button id="tambahElemen" onclick="s()">Tambah Elemen</button>
            <button id="hapusParagraf" onclick="y()">Hapus Paragraf</button>
        </div>
    </div>

  

  <script>
   
    let teksUtama = document.getElementById("teksUtama");
    // let btnUbah = document.getElementById("ubahTeks");
    // let btnTambah = document.getElementById("tambahElemen");
    // let btnHapus = document.getElementById("hapusParagraf");

    
    function t() {
      teksUtama.textContent = "Teks ini telah diubah menggunakan DOM.";
    }

    
    function s() {
      let paragrafBaru = document.createElement("p");
      paragrafBaru.textContent = "Elemen baru berhasil ditambahkan!";
      document.body.appendChild(paragrafBaru);
    }

    
    function y() {
      teksUtama.remove();
    }
  </script>

</body>
</html>
